name: Nightly Build and Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    # 1. Define your variables once here
    env:
      BUILDER_IMAGE: vincent4486/valeciumos-builder
      BUILDER_TAG: i686
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_IP: ${{ secrets.REMOTE_IP }}
      REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
      REMOTE_PATH: /var/webdownloads/valecium/nightly

    steps:
      - uses: actions/checkout@v3

      - name: Pull builder container image
        run: |
          # 2. Reference the variables using $ syntax
          docker pull ${{ env.BUILDER_IMAGE }}:${{ env.BUILDER_TAG }}

      - name: Build kernel + image formats inside container
        run: |
          set -euo pipefail

          short_hash=$(git rev-parse --short=7 HEAD 2>/dev/null || echo "unknown")
          echo "SHORT_HASH=$short_hash" >> "$GITHUB_ENV"

          # 3. Use the same variables here to ensure consistency
          docker run --rm -v "$(pwd)":/build ${{ env.BUILDER_IMAGE }}:${{ env.BUILDER_TAG }} bash -lc '
            set -euo pipefail
            scons -Q config=debug outputFormat=img toolchain=../os_toolchain kernelVersionSource=fixed kernelVersion="'"$short_hash"'"
            scons -Q config=debug outputFormat=iso toolchain=../os_toolchain kernelVersionSource=fixed kernelVersion="'"$short_hash"'"
          '

      - name: Gather artifacts and create tarball
        run: |
          set -euo pipefail

          # Note: I updated the pattern to 'valecium-*' to match your new name
          kernel_file=$(find build -type f -name "valeciumx-*" | head -n 1)
          img_file=$(find build -type f -name "valeciumos-*.img" | head -n 1)
          iso_file=$(find build -type f -name "valeciumos-*.iso" | head -n 1)

          if [ -z "$kernel_file" ] || [ -z "$img_file" ] || [ -z "$iso_file" ]; then
            echo "ERROR: artifacts not found"
            exit 1
          fi

          short_hash="${SHORT_HASH:-unknown}"
          date_tag=$(date -u +"%Y%m%d%H%M%S")
          tarball="valecium-nightly-${date_tag}-${short_hash}.tar.xz"

          mkdir -p artifact
          cp -- "$kernel_file" "$img_file" "$iso_file" artifact/
          tar -cJf "$tarball" -C artifact .
          echo "TARBALL_NAME=$tarball" >> "$GITHUB_ENV"

      - name: Deploy tarball to remote server
        run: |
          set -euo pipefail
          
          # Using the ENV variable set in the previous step
          tarball="${{ env.TARBALL_NAME }}"

          mkdir -p ~/.ssh
          echo "$REMOTE_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$REMOTE_IP" >> ~/.ssh/known_hosts

          scp -o StrictHostKeyChecking=no "$tarball" "$REMOTE_USER@$REMOTE_IP:$REMOTE_PATH/"

          ssh -o StrictHostKeyChecking=no "$REMOTE_USER@$REMOTE_IP" \
            "REMOTE_PATH='$REMOTE_PATH' bash -se" <<'EOF'
          set -euo pipefail
          mkdir -p "$REMOTE_PATH"
          cd "$REMOTE_PATH"
          ls -1t *.tar.xz 2>/dev/null | tail -n +11 | xargs -r rm --
          EOF