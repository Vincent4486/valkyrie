name: Build and Deploy Images to Server

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TOOLCHAIN_ROOT: toolchains
      TOOLCHAIN_DIR: toolchains/host-x86_64-linux-gnu
      TOOLCHAIN_URL: https://downloads.vyang.org/host-x86_64-linux-gnu.tar.xz
    steps:
      - uses: actions/checkout@v3

      - name: Cache toolchain
        uses: actions/cache@v3
        with:
          path: ${{ env.TOOLCHAIN_ROOT }}
          key: build-toolchain-host-x86_64-linux-gnu-v1
          restore-keys: |
            build-toolchain-host-x86_64-linux-gnu-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip scons python3-sh curl xz-utils rsync openssh-client
          # use the helper script to install all required packages
          python3 scripts/base/dependencies.py --yes

      - name: Download and extract toolchain
        run: |
          mkdir -p "${TOOLCHAIN_ROOT}"
          if [ ! -x "${TOOLCHAIN_DIR}/bin/i686-linux-musl-gcc" ]; then
            rm -rf "${TOOLCHAIN_DIR}" /tmp/host-toolchain-extract
            mkdir -p "${TOOLCHAIN_DIR}" /tmp/host-toolchain-extract
            curl -fL "${TOOLCHAIN_URL}" -o /tmp/host-toolchain.tar.xz
            tar -xJf /tmp/host-toolchain.tar.xz -C /tmp/host-toolchain-extract
            if [ -d /tmp/host-toolchain-extract/host-x86_64-linux-gnu ]; then
              rsync -a /tmp/host-toolchain-extract/host-x86_64-linux-gnu/ "${TOOLCHAIN_DIR}/"
            else
              rsync -a /tmp/host-toolchain-extract/ "${TOOLCHAIN_DIR}/"
            fi
          fi

      - name: Build release hard disk image (.img)
        run: |
          scons toolchain=${TOOLCHAIN_DIR} config=release outputFormat=img buildType=full

      - name: Build release ISO image (.iso)
        run: |
          scons toolchain=${TOOLCHAIN_DIR} config=release outputFormat=iso buildType=full

      - name: Package kernel and images
        run: |
          set -euo pipefail
          ARTIFACT_DIR=build/artifacts
          RELEASE_DIR=build/i686_release
          mkdir -p "${ARTIFACT_DIR}"

          IMG_FILE=$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*.img' | head -n1)
          ISO_FILE=$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*.iso' | head -n1)
          KERNEL_FILE=$(find "${RELEASE_DIR}/kernel" -maxdepth 1 -type f -name 'valkyrix-*' | head -n1)

          [ -n "${IMG_FILE}" ] && [ -f "${IMG_FILE}" ]
          [ -n "${ISO_FILE}" ] && [ -f "${ISO_FILE}" ]
          [ -n "${KERNEL_FILE}" ] && [ -f "${KERNEL_FILE}" ]

          tar -cJf "${ARTIFACT_DIR}/$(basename "${IMG_FILE}").tar.xz" -C "$(dirname "${IMG_FILE}")" "$(basename "${IMG_FILE}")"
          tar -cJf "${ARTIFACT_DIR}/$(basename "${ISO_FILE}").tar.xz" -C "$(dirname "${ISO_FILE}")" "$(basename "${ISO_FILE}")"
          tar -cJf "${ARTIFACT_DIR}/$(basename "${KERNEL_FILE}").tar.xz" -C "$(dirname "${KERNEL_FILE}")" "$(basename "${KERNEL_FILE}")"

      - name: Deploy build artifacts via SSH
        if: github.event_name == 'push'
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_IP: ${{ secrets.REMOTE_IP }}
          REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$REMOTE_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$REMOTE_IP" >> ~/.ssh/known_hosts
          rsync -avz build/artifacts/ $REMOTE_USER@$REMOTE_IP:/var/webdownloads/valkyrie/
          echo "Build artifacts deployed to $REMOTE_USER@$REMOTE_IP:/var/webdownloads/valkyrie/"


