name: Nightly Build and Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_IP: ${{ secrets.REMOTE_IP }}
      REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
      REMOTE_PATH: /var/webdownloads/valkyrie/nightly

    steps:
      - uses: actions/checkout@v3

      - name: Pull builder container image
        run: |
          docker pull vincent4486/valkyrieos-builder:latest

      - name: Build kernel + image formats inside container
        run: |
          set -euo pipefail
          docker run --rm -v "$(pwd)":/build vincent4486/valkyrieos-builder:latest bash -lc '
            set -euo pipefail
            scons -Q config=debug outputFormat=img toolchain=../os_toolchain
            scons -Q config=debug outputFormat=iso toolchain=../os_toolchain
          '

      - name: Gather artifacts and create tarball
        run: |
          set -euo pipefail

          # find outputs
          kernel_file=$(find build -type f -name "valkyrix-*" | head -n 1)
          img_file=$(find build -type f -name "valkyrieos-*.img" | head -n 1)
          iso_file=$(find build -type f -name "valkyrieos-*.iso" | head -n 1)

          if [ -z "$kernel_file" ] || [ -z "$img_file" ] || [ -z "$iso_file" ]; then
            echo "ERROR: expected kernel, img, and iso outputs not all found"
            echo "kernel=$kernel_file, img=$img_file, iso=$iso_file"
            exit 1
          fi

          short_hash=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          date_tag=$(date -u +"%Y%m%d%H%M%S")
          tarball="valkyrie-nightly-${date_tag}-${short_hash}.tar.xz"

          mkdir -p artifact
          cp -- "$kernel_file" "$img_file" "$iso_file" artifact/
          tar -cJf "$tarball" -C artifact .

          echo "tarball=$tarball"
          ls -lh "$tarball"

      - name: Deploy tarball to remote server and rotate nights
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_IP: ${{ secrets.REMOTE_IP }}
          REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
          REMOTE_PATH: /var/webdownloads/valkyrie/nightly
        run: |
          set -euo pipefail

          tarball=$(ls valkyrie-nightly-*.tar.xz | head -n 1)
          if [ -z "$tarball" ]; then
            echo "ERROR: Tarball not found"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$REMOTE_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$REMOTE_IP" >> ~/.ssh/known_hosts

          scp -o StrictHostKeyChecking=no "$tarball" "$REMOTE_USER@$REMOTE_IP:$REMOTE_PATH/"

          ssh -o StrictHostKeyChecking=no "$REMOTE_USER@$REMOTE_IP" \
            "REMOTE_PATH='$REMOTE_PATH' bash -se" <<'EOF'
          set -euo pipefail
          mkdir -p "$REMOTE_PATH"
          cd "$REMOTE_PATH"
          # keep max 10 most recent tarballs by modification time
          ls -1t *.tar.xz 2>/dev/null | tail -n +11 | xargs -r rm --
          EOF
