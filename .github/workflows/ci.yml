name: Build and Deploy Documentatin to server

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-docs:
    runs-on: ubuntu-latest
    env:
      TOOLCHAIN_DIR: os_toolchain
    steps:
      - uses: actions/checkout@v3

      - name: Cache toolchain
        uses: actions/cache@v3
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-${{ hashFiles('**/.config') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip scons python3-sh
          # use the helper script to install all required packages
          printf 'y\n' | scons deps - --distro debian

      - name: Build cross-toolchain
        run: |
          # build the toolchain into the cached directory
          scons toolchain toolchain=${TOOLCHAIN_DIR}

      - name: Build full project
        run: |
          # pass the same toolchain path so scons can locate it
          scons toolchain=${TOOLCHAIN_DIR}

      - name: Build documentation
        run: |
          cd Documents && make html

      - name: Deploy documentation via SSH
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_IP: ${{ secrets.REMOTE_IP }}
          REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$REMOTE_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # adjust destination path as needed; use home directory as example
          rsync -avz Documents/build/html/ $REMOTE_USER@$REMOTE_IP:/var/webdocs/valkyrie/
          echo "Documentation deployed to $REMOTE_USER@$REMOTE_IP:/var/webdocs/valkyrie/"
