name: Build and Deploy Documentatin to Server

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master 

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build documentation
        run: |
          sudo apt-get install -y asciidoctor
          make -C Documentation html

      - name: Deploy documentation via SSH
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_IP: ${{ secrets.REMOTE_IP }}
          REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$REMOTE_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$REMOTE_IP" >> ~/.ssh/known_hosts
          rsync -avz Documentation/build/html/ $REMOTE_USER@$REMOTE_IP:/var/webdocs/valecium/
          echo "Documentation deployed to $REMOTE_USER@$REMOTE_IP:/var/webdocs/valecuim/"
