name: Build and Deploy Images to Server

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TOOLCHAIN_DIR: os_toolchain
    steps:
      - uses: actions/checkout@v3

      - name: Cache toolchain
        uses: actions/cache@v3
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-${{ hashFiles('**/.config') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip scons python3-sh
          # use the helper script to install all required packages
          printf 'y\n' | scons deps

      - name: Build cross-toolchain
        run: |
          # build the toolchain into the cached directory
          scons toolchain toolchain=${TOOLCHAIN_DIR}

      - name: Build full project
        run: |
          # pass the same toolchain path so scons can locate it
          scons toolchain=${TOOLCHAIN_DIR}


